<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeHub - Admin Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f5f5;
        }

        /* Header */
        .admin-header {
            background-color: #2E7D32;
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }

        .logo h1 {
            font-size: 1.5rem;
        }

        .admin-info {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .logout-btn {
            background-color: #ff4444;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 5px;
            cursor: pointer;
        }

        .logout-btn:hover {
            background-color: #cc0000;
        }

        /* Container */
        .admin-container {
            display: flex;
            min-height: calc(100vh - 70px);
        }

        /* Sidebar */
        .sidebar {
            width: 250px;
            background-color: white;
            border-right: 1px solid #ddd;
            padding: 20px 0;
        }

        .sidebar a {
            display: block;
            padding: 12px 20px;
            color: #333;
            text-decoration: none;
            transition: background-color 0.3s;
        }

        .sidebar a:hover {
            background-color: #f0f0f0;
        }

        .sidebar a.active {
            background-color: #2E7D32;
            color: white;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            padding: 20px;
        }

        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background-color: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            text-align: center;
        }

        .stat-number {
            font-size: 2rem;
            font-weight: bold;
            color: #2E7D32;
        }

        .stat-label {
            color: #666;
            margin-top: 5px;
        }

        /* Tables */
        .data-table {
            background-color: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            width: 100%;
            border-collapse: collapse;
        }

        .data-table th,
        .data-table td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }

        .data-table th {
            background-color: #2E7D32;
            color: white;
        }

        .section-title {
            margin: 20px 0 15px 0;
            color: #1B5E20;
        }

        .btn {
            padding: 6px 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        .btn-edit {
            background-color: #FF9800;
            color: white;
        }

        .btn-delete {
            background-color: #ff4444;
            color: white;
        }
    </style>
</head>
<body>
    <div class="admin-header">
        <div class="logo">
            <h1>SafeHub Admin Panel</h1>
        </div>
        <div class="admin-info">
            <span id="adminName">Admin</span>
            <button class="logout-btn" id="logoutBtn">Logout</button>
        </div>
    </div>

    <div class="admin-container">
        <div class="sidebar">
            <a href="admin-dashboard.html" class="active">📊 Dashboard</a>
            <a href="admin-users.html">👥 User Management</a>
            <a href="#" id="productsLink">📦 Products</a>
            <a href="#" id="ordersLink">🛒 Orders</a>
        </div>

        <div class="main-content">
            <h2>Dashboard Overview</h2>
            
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-number" id="totalUsers">0</div>
                    <div class="stat-label">Total Users</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="totalProducts">0</div>
                    <div class="stat-label">Total Products</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="totalOrders">0</div>
                    <div class="stat-label">Total Orders</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="pendingDisputes">0</div>
                    <div class="stat-label">Pending Disputes</div>
                </div>
            </div>

            <h3 class="section-title">Recent Users</h3>
            <table class="data-table" id="recentUsersTable">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Role</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody>
                    <tr><td colspan="5">Loading...</td></tr>
                </tbody>
            </table>

            <h3 class="section-title">Recent Orders</h3>
            <table class="data-table" id="recentOrdersTable">
                <thead>
                    <tr>
                        <th>Order #</th>
                        <th>Buyer</th>
                        <th>Total</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>
                    <tr><td colspan="5">Loading...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // Sample data for demonstration
        let users = [
            { id: 1, name: "Thabo Mokoena", email: "thabo@email.com", role: "Seller", status: "Verified" },
            { id: 2, name: "Lerato S.", email: "lerato@email.com", role: "Buyer", status: "Active" },
            { id: 3, name: "Khumalo Spaza", email: "spaza@email.com", role: "Pickup Point", status: "Active" },
            { id: 4, name: "Zandi N.", email: "zandi@email.com", role: "Seller", status: "Pending Verification" }
        ];

        let orders = [
            { id: "SA-001", buyer: "Thabo Mokoena", total: "R450", status: "Pending" },
            { id: "SA-002", buyer: "Lerato S.", total: "R240", status: "Processing" },
            { id: "SA-003", buyer: "Bongani D.", total: "R120", status: "Completed" }
        ];

        // Check if user is logged in
        function checkAuth() {
            const isLoggedIn = sessionStorage.getItem('adminLoggedIn');
            if (!isLoggedIn || isLoggedIn !== 'true') {
                window.location.href = 'admin-login.html';
            }
        }

        // Update dashboard stats
        function updateStats() {
            document.getElementById('totalUsers').textContent = users.length;
            document.getElementById('totalProducts').textContent = "12";
            document.getElementById('totalOrders').textContent = orders.length;
            document.getElementById('pendingDisputes').textContent = "2";
        }

        // Render recent users table
        function renderUsersTable() {
            const tbody = document.querySelector('#recentUsersTable tbody');
            if (!tbody) return;
            
            let html = '';
            users.forEach(user => {
                html += `
                    <tr>
                        <td>${user.id}</td>
                        <td>${user.name}</td>
                        <td>${user.email}</td>
                        <td>${user.role}</td>
                        <td>${user.status}</td>
                    </tr>
                `;
            });
            tbody.innerHTML = html;
        }

        // Render orders table
        function renderOrdersTable() {
            const tbody = document.querySelector('#recentOrdersTable tbody');
            if (!tbody) return;
            
            let html = '';
            orders.forEach(order => {
                html += `
                    <tr>
                        <td>${order.id}</td>
                        <td>${order.buyer}</td>
                        <td>${order.total}</td>
                        <td>${order.status}</td>
                        <td><button class="btn btn-edit" onclick="alert('Process order ${order.id}')">Process</button></td>
                    </tr>
                `;
            });
            tbody.innerHTML = html;
        }

        // Logout function
        function logout() {
            sessionStorage.removeItem('adminLoggedIn');
            sessionStorage.removeItem('adminUsername');
            window.location.href = 'admin-login.html';
        }

        // Initialize page
        function init() {
            checkAuth();
            updateStats();
            renderUsersTable();
            renderOrdersTable();
            
            // Set admin name
            const adminName = sessionStorage.getItem('adminUsername') || 'Admin';
            document.getElementById('adminName').textContent = adminName;
            
            // Logout button
            document.getElementById('logoutBtn').addEventListener('click', logout);
            
            // Navigation links
            document.getElementById('productsLink').addEventListener('click', (e) => {
                e.preventDefault();
                alert('Products management page would show all products with edit/delete options');
            });
            
            document.getElementById('ordersLink').addEventListener('click', (e) => {
                e.preventDefault();
                alert('Orders management page would show all orders with status update options');
            });
        }

        init();
    </script>
</body>
</html>
